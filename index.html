<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="YarikCoin.css"></link>
    <title>YarikCoin</title>
</head>
<body>
    <h1>YarikCoin</h1>
    <div class="price">
        <h1 style="font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif; margin-right: 10px;">Price:</h1>
        <h1 id="price"></h1>
    </div>
    <div class="maxPrice">
        <h1 style="display: inline-block;">Max price:</h1>
        <h1 id="maxPrice" style="display: inline-block;"></h1>
    </div>
    <div class="minPrice">
        <h1 style="display: inline-block;">Min price:</h1>
        <h1 id="minPrice" style="display: inline-block;"></h1>
    </div>
    <div class="shop">
        <div class="btns">
            <button id="buy">Buy</button>
            <button id="sell">Sell</button>
        </div>
        <div class="balance">
            <h1 style="display: inline-block;">Balance:</h1>
            <h1 id="balance" style="display: inline-block;"></h1>
        </div>
        <div class="onBalance">
            <h1 style="display: inline-block;">YarikCoin on balance:</h1>
            <h1 id="onBalance" style="display: inline-block;"></h1>
        </div>
    </div>
</body>
<script src="YarikCoin.js"></script>
</html>
